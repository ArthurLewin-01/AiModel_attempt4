<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

.typing {
opacity: 0.6;
font-style: italic;
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col">

<div class="p-4 border-b border-white/20 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i> New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fab fa-google mr-2"></i> Login

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<input
id="searchInput"
type="text"
placeholder="Search chats..."
class="mx-3 mt-3 p-2 rounded-lg bg-white/10 border border-white/20 text-sm"
/>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-white/20 bg-white/5">

<h1 id="chatTitle"
class="font-bold text-lg">

New Chat

</h1>

</div>

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 border-t border-white/20 bg-white/5 flex space-x-3">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4",
storageBucket: "aimodel-attempt4.firebasestorage.app",
messagingSenderId: "375459768438",
appId: "1:375459768438:web:e2a3071225c2bee5225757"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* STATE */

let chats = [];
let activeChatId = null;
let loggedIn = false;
let userId = null;

/* LOGIN */

document.getElementById("loginBtn").onclick = () => {
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
};

document.getElementById("logoutBtn").onclick = () => {
auth.signOut();
};

/* AUTH */

auth.onAuthStateChanged(user => {

if(user){

loggedIn = true;
userId = user.uid;

document.getElementById("loginBtn").classList.add("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");

document.getElementById("userName").innerText = user.displayName;

loadChats();

}

else {

loggedIn = false;

chats = [];
activeChatId = null;

document.getElementById("messages").innerHTML = "";
document.getElementById("chatList").innerHTML = "";

}

});

/* LOAD */

function loadChats(){

db.collection("users")
.doc(userId)
.collection("chats")
.get()
.then(snapshot=>{

chats=[];

snapshot.forEach(doc=>{
chats.push(doc.data());
});

if(chats.length===0){

createNewChat();

}

else{

activeChatId = chats[0].id;

renderChatList();
renderMessages();

}

});

}

/* CREATE */

function createNewChat(){

const id = Date.now().toString();

const chat = {
id,
title:"New Chat",
messages:[]
};

chats.unshift(chat);

activeChatId = id;

saveChats();
renderChatList();
renderMessages();

}

/* SAVE */

function saveChats(){

if(!loggedIn) return;

chats.forEach(chat=>{

db.collection("users")
.doc(userId)
.collection("chats")
.doc(chat.id)
.set(chat);

});

}

/* SEARCH */

document
.getElementById("searchInput")
.addEventListener("input",e=>{

renderChatList(e.target.value.toLowerCase());

});

/* CHAT LIST */

function renderChatList(search=""){

const list =
document.getElementById("chatList");

list.innerHTML="";

chats.forEach(chat=>{

if(search &&
!chat.title.toLowerCase().includes(search))
return;

const item=document.createElement("div");

item.className=
"flex justify-between items-center p-3 rounded-lg hover:bg-white/20 cursor-pointer";

if(chat.id===activeChatId)
item.classList.add("bg-white/20");

const title=document.createElement("span");

title.innerText=chat.title;

title.onclick=()=>{

activeChatId=chat.id;

renderChatList();
renderMessages();

};

const menu=document.createElement("button");

menu.innerHTML="<i class='fas fa-ellipsis-v'></i>";

menu.onclick=(e)=>{

e.stopPropagation();
showMenu(chat.id);

};

item.appendChild(title);
item.appendChild(menu);

list.appendChild(item);

});

}

/* MENU */

function showMenu(chatId){

const box=document.createElement("div");

box.className=
"fixed bg-black border border-white/20 p-2 rounded-lg space-y-2";

const rename=document.createElement("button");

rename.innerText="Rename";

rename.onclick=()=>{

const newName=prompt("New name:");

if(newName){

const chat=
chats.find(c=>c.id===chatId);

chat.title=newName;

saveChats();
renderChatList();

}

box.remove();

};

const del=document.createElement("button");

del.innerText="Delete";

del.onclick=()=>{

chats=
chats.filter(c=>c.id!==chatId);

saveChats();

renderChatList();
renderMessages();

box.remove();

};

box.appendChild(rename);
box.appendChild(del);

document.body.appendChild(box);

setTimeout(()=>box.remove(),3000);

}

/* AI CALL */

async function askAI(messages){

const res = await fetch(
"http://localhost:3000/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:messages
})
}
);

const data = await res.json();

return data.reply;

}

/* SEND */

async function sendMessage(){

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if(!text) return;

const chat =
chats.find(c=>c.id===activeChatId);

chat.messages.push({
role:"user",
content:text
});

input.value="";

renderMessages();

/* typing */

addMessageToUI(
"assistant",
"AI is typing...",
true
);

scrollBottom();

/* REAL AI */

const reply =
await askAI(chat.messages);

chat.messages.push({
role:"assistant",
content:reply
});

renderMessages();

saveChats();

}

/* UI */

function addMessageToUI(role,text,typing=false){

const container =
document.getElementById("messages");

const msg =
document.createElement("div");

msg.classList.add(
"chat-bubble",
"p-3",
"rounded-xl",
"max-w-xl"
);

if(role==="user"){

msg.classList.add(
"ml-auto",
"bg-blue-500"
);

}

else{

msg.classList.add(
"bg-white/10"
);

}

if(typing)
msg.classList.add("typing");

msg.innerText=text;

container.appendChild(msg);

}

/* RENDER */

function renderMessages(){

const container =
document.getElementById("messages");

container.innerHTML="";

const chat =
chats.find(c=>c.id===activeChatId);

if(!chat) return;

chat.messages.forEach(m=>{

addMessageToUI(
m.role,
m.content
);

});

scrollBottom();

}

/* SCROLL */

function scrollBottom(){

const c =
document.getElementById("messages");

c.scrollTop =
c.scrollHeight;

}

/* EVENTS */

document
.getElementById("newChatBtn")
.onclick=createNewChat;

document
.getElementById("sendBtn")
.onclick=sendMessage;

document
.getElementById("messageInput")
.addEventListener("keydown",e=>{

if(e.key==="Enter"&&!e.shiftKey){

e.preventDefault();

sendMessage();

}

});

</script>

</body>
</html>
