<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col">

<div class="p-4 border-b border-white/20 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i>
New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fab fa-google mr-2"></i>
Login with Google

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<input
id="searchInput"
type="text"
placeholder="Search chats..."
class="mx-3 mt-3 p-2 rounded-lg bg-white/10 border border-white/20 text-sm"
/>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-white/20 bg-white/5">

<h1 id="chatTitle"
class="font-bold text-lg">

New Chat

</h1>

</div>

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<!-- INPUT AREA -->

<div class="p-4 border-t border-white/20 bg-white/5">

<div class="flex space-x-3 items-end">

<!-- IMAGE BUTTON -->

<input type="file"
id="imageUpload"
accept="image/*"
class="hidden">

<button
onclick="document.getElementById('imageUpload').click()"
class="p-3 rounded-xl bg-white/10 hover:bg-white/20">

<i class="fas fa-image"></i>

</button>

<!-- FILE BUTTON -->

<input type="file"
id="fileUpload"
class="hidden">

<button
onclick="document.getElementById('fileUpload').click()"
class="p-3 rounded-xl bg-white/10 hover:bg-white/20">

<i class="fas fa-paperclip"></i>

</button>

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script>

/* ---------- FILE & IMAGE HANDLING ---------- */

document
.getElementById("imageUpload")
.addEventListener("change", e => {

const file = e.target.files[0];

if (!file) return;

const reader = new FileReader();

reader.onload = () => {

addFileMessage(
"image",
reader.result,
file.name
);

};

reader.readAsDataURL(file);

});

document
.getElementById("fileUpload")
.addEventListener("change", e => {

const file = e.target.files[0];

if (!file) return;

addFileMessage(
"file",
"",
file.name
);

});

function addFileMessage(type,data,name){

const chat=
chats.find(c=>c.id===activeChatId);

chat.messages.push({

role:"user",
type:type,
content:data,
name:name

});

renderMessages();

saveChats();

}

/* ---------- MESSAGE RENDER ---------- */

function addMessageToUI(role,text,type,name){

const container=
document.getElementById("messages");

const msg=
document.createElement("div");

msg.classList.add(
"chat-bubble",
"p-3",
"rounded-xl",
"max-w-xl"
);

if(role==="user"){

msg.classList.add(
"ml-auto",
"bg-blue-500"
);

}else{

msg.classList.add(
"bg-white/10"
);

}

if(type==="image"){

const img=
document.createElement("img");

img.src=text;

img.className="rounded-lg max-w-xs";

msg.appendChild(img);

}

else if(type==="file"){

msg.innerHTML=
`📄 ${name}`;

}

else{

msg.innerText=text;

}

container.appendChild(msg);

}

/* Remaining chat logic stays same */

</script>

</body>
</html>
