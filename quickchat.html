<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white min-h-screen">

<div class="flex h-screen overflow-hidden">

<!-- MOBILE MENU BUTTON -->

<button id="menuBtn"
class="md:hidden fixed top-4 left-4 z-50 bg-white/20 p-3 rounded-xl">

<i class="fas fa-bars"></i>

</button>

<!-- SIDEBAR -->

<div id="sidebar"
class="fixed md:relative w-[260px] h-full bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40">

<div class="p-4 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i>
New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-blue-600">

Login

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2"></div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col h-full">

<!-- MESSAGES -->

<div id="messages"
class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">

</div>

<!-- INPUT -->

<div class="p-3 md:p-4 flex space-x-3 border-t border-white/10 bg-black/30">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-4 md:px-5 py-3 rounded-xl bg-blue-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script>

/* MOBILE MENU */

menuBtn.onclick = () => {

sidebar.classList.toggle(
"-translate-x-full"
);

};

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* STATE */

let chats=[];
let activeChatId=null;
let userId=null;

/* LOGIN */

loginBtn.onclick=
()=>auth.signInWithPopup(
new firebase.auth.GoogleAuthProvider()
);

logoutBtn.onclick=
()=>auth.signOut();

/* AUTH */

auth.onAuthStateChanged(user=>{

if(user){

userId=user.uid;

loginBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");

userName.innerText=user.displayName;

loadChats();

}

});

/* LOAD */

function loadChats(){

db.collection("users")
.doc(userId)
.collection("chats")
.get()
.then(snapshot=>{

chats=[];

snapshot.forEach(doc=>{
chats.push(doc.data());
});

if(chats.length===0)
createNewChat();
else
activeChatId=chats[0].id;

renderChatList();
renderMessages();

});

}

/* NEW CHAT */

function createNewChat(){

const id=
Date.now().toString();

const chat={
id,
title:"New Chat",
messages:[]
};

chats.unshift(chat);

activeChatId=id;

renderChatList();
renderMessages();

saveChats();

}

newChatBtn.onclick=createNewChat;

/* SAVE */

function saveChats(){

chats.forEach(chat=>{

db.collection("users")
.doc(userId)
.collection("chats")
.doc(chat.id)
.set(chat);

});

}

/* CHAT LIST */

function renderChatList(){

chatList.innerHTML="";

chats.forEach(chat=>{

const item=
document.createElement("div");

item.className=
"flex justify-between items-center p-3 rounded-lg hover:bg-white/20 cursor-pointer";

if(chat.id===activeChatId)
item.classList.add("bg-white/20");

const title=
document.createElement("span");

title.innerText=chat.title;

title.onclick=()=>{

activeChatId=chat.id;

renderChatList();
renderMessages();

};

const menu=
document.createElement("button");

menu.innerHTML=
"<i class='fas fa-ellipsis-v'></i>";

menu.onclick=(e)=>{

e.stopPropagation();

showMenu(chat.id,e);

};

item.appendChild(title);
item.appendChild(menu);

chatList.appendChild(item);

});

}

/* MENU */

function showMenu(chatId,event){

const old=
document.getElementById("chatMenu");

if(old) old.remove();

const box=
document.createElement("div");

box.id="chatMenu";

box.className=
"fixed bg-black border border-white/20 p-2 rounded-lg space-y-2 z-50";

box.style.top=
event.clientY+"px";

box.style.left=
event.clientX+"px";

const rename=
document.createElement("button");

rename.innerText="Rename";

rename.className=
"block w-full text-left hover:bg-white/20 p-2 rounded";

rename.onclick=()=>{

const newName=
prompt("Enter new name:");

if(newName){

const chat=
chats.find(
c=>c.id===chatId
);

chat.title=newName;

saveChats();
renderChatList();

}

box.remove();

};

const del=
document.createElement("button");

del.innerText="Delete";

del.className=
"block w-full text-left hover:bg-red-500/30 p-2 rounded";

del.onclick=()=>{

chats=
chats.filter(
c=>c.id!==chatId
);

if(chats.length>0)
activeChatId=chats[0].id;
else
createNewChat();

saveChats();

renderChatList();
renderMessages();

box.remove();

};

box.append(rename,del);

document.body.appendChild(box);

}

/* MESSAGE UI */

function addBubble(role,text){

const msg=
document.createElement("div");

msg.className=
"chat-bubble p-3 rounded-xl max-w-xl";

if(role==="user")
msg.classList.add("ml-auto","bg-blue-500");
else
msg.classList.add("bg-white/10");

msg.innerText=text;

messages.appendChild(msg);

scrollBottom();

}

/* RENDER */

function renderMessages(){

messages.innerHTML="";

const chat=
chats.find(
c=>c.id===activeChatId
);

if(!chat) return;

chat.messages.forEach(m=>{

addBubble(
m.role,
m.content
);

});

}

/* AI */

async function askAI(messagesData){

const res=
await fetch(
"https://ai-chat-server-ltfa.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:messagesData
})
}
);

const data=
await res.json();

return data.reply;

}

/* SEND */

async function sendMessage(){

const text=
messageInput.value.trim();

if(!text) return;

const chat=
chats.find(
c=>c.id===activeChatId
);

chat.messages.push({
role:"user",
content:text
});

messageInput.value="";

renderMessages();

addBubble(
"assistant",
"AI is typing..."
);

const reply=
await askAI(
chat.messages
);

messages.removeChild(
messages.lastChild
);

chat.messages.push({
role:"assistant",
content:reply
});

renderMessages();

saveChats();

}

/* EVENTS */

sendBtn.onclick=sendMessage;

messageInput.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"
&&!e.shiftKey){

e.preventDefault();

sendMessage();

}

}
);

function scrollBottom(){

messages.scrollTop=
messages.scrollHeight;

}

</script>

</body>
</html>
