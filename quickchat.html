<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

.sidebar {
transform: translateX(-100%);
transition: transform 0.3s ease;
}

.sidebar.open {
transform: translateX(0);
}

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white flex">

<!-- SIDEBAR -->

<div id="sidebar"
class="sidebar fixed w-80 h-full bg-white/5 backdrop-blur-md border-r border-white/10 p-6 z-50">

<div class="flex justify-between mb-6">

<h2 class="text-xl font-bold">

Chat History

</h2>

<button id="newChatBtn"
class="px-3 py-1 bg-white/10 rounded-lg">

New Chat

</button>

</div>

<div id="chatHistory"
class="space-y-2 overflow-y-auto max-h-[80vh]">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col w-full">

<header class="bg-white/10 border-b border-white/20 p-4 flex justify-between items-center">

<button id="sidebarToggle"
class="p-2 hover:bg-white/10 rounded-lg">

<i class="fas fa-bars"></i>

</button>

<a href="index.html"
class="px-4 py-2 bg-white/10 rounded-lg">

<i class="fas fa-arrow-left mr-2"></i>
Back

</a>

</header>

<div id="chatContainer"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 border-t border-white/10 bg-white/5">

<div class="flex space-x-3">

<input
id="messageInput"
type="text"
placeholder="Ask anything..."
class="flex-1 p-4 bg-white/10 border border-white/20 rounded-xl text-white"
/>

<button
id="sendBtn"
class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script src="quickchat.js"></script>

</body>

</html>
