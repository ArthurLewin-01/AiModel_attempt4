<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
font-family: 'Inter', sans-serif;
}

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}
</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white flex flex-col">

<!-- TOP BAR (Screenshot 2 style) -->

<header class="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

<div class="flex items-center space-x-3">

<div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">

<i class="fas fa-robot text-white"></i>

</div>

<h1 class="text-xl font-bold">
AI Companion Chat
</h1>

</div>

<a href="index.html"
class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg">
<i class="fas fa-arrow-left mr-2"></i>
Back
</a>

</div>

</header>

<!-- CHAT AREA -->

<div id="chatContainer"
class="flex-1 overflow-y-auto p-6 space-y-4">

<!-- Messages appear here -->

</div>

<!-- INPUT BAR -->

<div class="p-4 border-t border-white/10 bg-white/5">

<div class="max-w-4xl mx-auto flex space-x-3">

<input
id="messageInput"
type="text"
placeholder="Ask anything..."
class="flex-1 p-4 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button
id="sendBtn"
class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl hover:opacity-90">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

<script src="quickchat.js"></script>

</body>
</html>
