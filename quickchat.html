<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col">

<div class="p-4 border-b border-white/20 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i>
New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fab fa-google mr-2"></i>
Login with Google

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-white/20 bg-white/5">

<h1 id="chatTitle"
class="font-bold text-lg">

New Chat

</h1>

</div>

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 border-t border-white/20 bg-white/5">

<div class="flex space-x-3">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script>

/* FIREBASE INIT */

const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4",
storageBucket: "aimodel-attempt4.firebasestorage.app",
messagingSenderId: "375459768438",
appId: "1:375459768438:web:e2a3071225c2bee5225757",
measurementId: "G-4ZBX0RDG8W"
};

firebase.initializeApp(firebaseConfig);

const auth =
firebase.auth();

const db =
firebase.firestore();


/* AUTH */

const loginBtn =
document.getElementById("loginBtn");

const logoutBtn =
document.getElementById("logoutBtn");

const userNameDiv =
document.getElementById("userName");


loginBtn.onclick = () => {

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

};


logoutBtn.onclick = () => {

auth.signOut();

};


auth.onAuthStateChanged(user => {

if (user) {

loginBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");

userNameDiv.innerText =
user.displayName;

loadChats(user.uid);

}

else {

loginBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");

userNameDiv.innerText = "";

}

});


/* CHAT SYSTEM */

let chats = [];
let activeChatId = null;
let currentUserId = null;


function loadChats(uid) {

currentUserId = uid;

db.collection("users")
.doc(uid)
.collection("chats")
.get()
.then(snapshot => {

chats = [];

snapshot.forEach(doc => {

chats.push(doc.data());

});

if (chats.length === 0) {

createNewChat();

}

else {

activeChatId = chats[0].id;

renderChatList();
renderMessages();

}

});

}


function createNewChat() {

const id =
Date.now().toString();

const chat = {

id,
title: "New Chat",
messages: []

};

chats.unshift(chat);

activeChatId = id;

saveChats();

renderChatList();
renderMessages();

}


function saveChats() {

if (!currentUserId) return;

chats.forEach(chat => {

db.collection("users")
.doc(currentUserId)
.collection("chats")
.doc(chat.id)
.set(chat);

});

}


document
.getElementById("newChatBtn")
.onclick = createNewChat;


/* MESSAGE */

function sendMessage() {

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if (!text) return;

const chat =
chats.find(c => c.id === activeChatId);

chat.messages.push({
role:"user",
content:text
});

if (chat.messages.length === 1) {

chat.title =
text.substring(0,20);

}

input.value = "";

renderMessages();

setTimeout(() => {

chat.messages.push({
role:"assistant",
content:"Hello! This is a demo response."
});

renderMessages();
saveChats();

},800);

}


document
.getElementById("sendBtn")
.onclick = sendMessage;


/* UI */

function renderChatList() {

const list =
document.getElementById("chatList");

list.innerHTML = "";

chats.forEach(chat => {

const item =
document.createElement("div");

item.className =
"p-3 rounded-lg hover:bg-white/20 cursor-pointer";

item.innerText =
chat.title;

item.onclick = () => {

activeChatId = chat.id;

renderMessages();

};

list.appendChild(item);

});

}


function renderMessages() {

const container =
document.getElementById("messages");

container.innerHTML = "";

const chat =
chats.find(
c => c.id === activeChatId
);

if (!chat) return;

chat.messages.forEach(msg => {

const div =
document.createElement("div");

div.classList.add(
"p-3",
"rounded-xl",
"max-w-xl"
);

if (msg.role === "user") {

div.classList.add(
"ml-auto",
"bg-blue-500"
);

}

else {

div.classList.add(
"bg-white/10"
);

}

div.innerText =
msg.content;

container.appendChild(div);

});

container.scrollTop =
container.scrollHeight;

}

</script>

</body>
</html>
