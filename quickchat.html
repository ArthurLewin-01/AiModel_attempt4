<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Chat AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
.chat-bubble { animation: fadeIn 0.2s ease; }
@keyframes fadeIn {
from {opacity:0; transform:translateY(10px);}
to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->
<div class="w-[260px] bg-white/10 border-r border-white/20 flex flex-col">

<div class="p-3 space-y-2 border-b border-white/20">

<button id="newChatBtn" class="w-full p-2 rounded bg-white/10 hover:bg-white/20">
<i class="fas fa-plus"></i> New Chat
</button>

<button id="loginBtn" class="w-full p-2 rounded bg-blue-500">
<i class="fab fa-google"></i> Login
</button>

<button id="logoutBtn" class="w-full p-2 rounded bg-red-500 hidden">
Logout
</button>

<input id="searchInput" placeholder="Search chats..."
class="w-full p-2 mt-2 rounded bg-white/10">

</div>

<div id="chatList" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<div class="p-3 border-b border-white/20 bg-white/5">
<h1 id="chatTitle">New Chat</h1>
</div>

<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

<!-- INPUT -->
<div class="p-3 border-t border-white/20 flex gap-2">

<input type="file" id="imageUpload" class="hidden">
<input type="file" id="fileUpload" class="hidden">

<button onclick="document.getElementById('imageUpload').click()"
class="p-2 bg-white/10 rounded"><i class="fas fa-image"></i></button>

<button onclick="document.getElementById('fileUpload').click()"
class="p-2 bg-white/10 rounded"><i class="fas fa-paperclip"></i></button>

<textarea id="messageInput"
class="flex-1 p-2 rounded bg-white/10 resize-none"
placeholder="Send message..."></textarea>

<button id="sendBtn"
class="px-4 bg-blue-500 rounded"><i class="fas fa-paper-plane"></i></button>

</div>
</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4",
storageBucket: "aimodel-attempt4.firebasestorage.app",
messagingSenderId: "375459768438",
appId: "1:375459768438:web:e2a3071225c2bee5225757"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ================= OPENAI ================= */
const OPENAI_KEY = "YOUR_OPENAI_API_KEY";

/* ================= STATE ================= */
let chats = [];
let activeChatId = null;
let userId = null;

/* ================= AUTH ================= */
document.getElementById("loginBtn").onclick = () => {
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
};

document.getElementById("logoutBtn").onclick = () => auth.signOut();

auth.onAuthStateChanged(async user => {

if(user){
userId = user.uid;
document.getElementById("loginBtn").classList.add("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");
loadChats();
}
else{
userId = null;
chats = [];
document.getElementById("chatList").innerHTML = "";
document.getElementById("messages").innerHTML = "";
}
});

/* ================= LOAD ================= */
function loadChats(){
db.collection("users").doc(userId).collection("chats").get()
.then(snap=>{
chats = [];
snap.forEach(d=>chats.push(d.data()));
if(chats.length===0) createNewChat();
else{
activeChatId = chats[0].id;
render();
}
});
}

/* ================= SAVE ================= */
function save(){
if(!userId) return;
chats.forEach(c=>{
db.collection("users").doc(userId)
.collection("chats").doc(c.id).set(c);
});
}

/* ================= CHAT ================= */
function createNewChat(){
const id = Date.now().toString();
chats.unshift({id,title:"New Chat",messages:[]});
activeChatId = id;
save();
render();
}

function render(){
renderChats();
renderMessages();
}

function renderChats(search=""){
const list = document.getElementById("chatList");
list.innerHTML="";

chats.forEach(c=>{
if(search && !c.title.toLowerCase().includes(search)) return;

const div = document.createElement("div");
div.className = "p-2 rounded bg-white/10 cursor-pointer flex justify-between";

if(c.id===activeChatId) div.classList.add("bg-white/30");

div.innerHTML = `
<span>${c.title}</span>
<i class="fas fa-ellipsis"></i>
`;

div.onclick = () => {
activeChatId = c.id;
render();
};

list.appendChild(div);
});
}

function renderMessages(){
const box = document.getElementById("messages");
box.innerHTML="";
const chat = chats.find(c=>c.id===activeChatId);
if(!chat) return;

chat.messages.forEach(m=>{
const div = document.createElement("div");
div.className = "p-2 rounded max-w-xs " +
(m.role==="user" ? "ml-auto bg-blue-500" : "bg-white/10");

div.innerText = m.content;
box.appendChild(div);
});
}

/* ================= OPENAI ================= */
async function askAI(messages){

const res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:messages
})
});

const data = await res.json();
return data.choices[0].message.content;
}

/* ================= SEND ================= */
document.getElementById("sendBtn").onclick = async () => {

const input = document.getElementById("messageInput");
const text = input.value.trim();
if(!text) return;

const chat = chats.find(c=>c.id===activeChatId);

chat.messages.push({role:"user",content:text});
input.value="";

renderMessages();

const reply = await askAI([
{role:"system",content:"You are a helpful assistant."},
...chat.messages
]);

chat.messages.push({role:"assistant",content:reply});

save();
renderMessages();
};

/* ================= SEARCH ================= */
document.getElementById("searchInput").addEventListener("input",(e)=>{
renderChats(e.target.value.toLowerCase());
});

/* ================= INIT ================= */
document.getElementById("newChatBtn").onclick = createNewChat;

</script>

</body>
</html>
