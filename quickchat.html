<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR (FIXED LEFT) -->

<div class="w-72 bg-black/30 backdrop-blur-md border-r border-white/10 flex flex-col">

<!-- TOP BUTTONS -->

<div class="p-4 space-y-3 border-b border-white/10">

<button id="newChatBtn"
class="w-full p-3 bg-white/10 hover:bg-white/20 rounded-xl">

➕ New Chat

</button>

<button id="loginBtn"
class="w-full p-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl hover:opacity-90">

<i class="fab fa-google mr-2"></i>
Login with Google

</button>

</div>

<!-- CHAT HISTORY -->

<div id="chatHistory"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN CHAT AREA -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<header class="bg-white/10 border-b border-white/10 p-4 flex justify-between">

<h1 class="font-bold text-lg">

Quick Chat

</h1>

<a href="index.html"
class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg">

<i class="fas fa-arrow-left mr-2"></i>
Back

</a>

</header>

<!-- CHAT AREA -->

<div id="chatContainer"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<!-- INPUT -->

<div class="p-4 border-t border-white/10 bg-white/5">

<div class="flex space-x-3">

<input
id="messageInput"
type="text"
placeholder="Ask anything..."
class="flex-1 p-4 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-300 focus:outline-none"
/>

<button
id="sendBtn"
class="px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl hover:opacity-90">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script src="quickchat.js"></script>

</body>

</html>
