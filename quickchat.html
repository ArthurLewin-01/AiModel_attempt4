<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col">

<div class="p-4 border-b border-white/20 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i>
New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fab fa-google mr-2"></i>
Login with Google

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-white/20 bg-white/5">

<h1 id="chatTitle"
class="font-bold text-lg">

New Chat

</h1>

</div>

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 border-t border-white/20 bg-white/5">

<div class="flex space-x-3">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script>

/* FIREBASE INIT */

const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4",
storageBucket: "aimodel-attempt4.firebasestorage.app",
messagingSenderId: "375459768438",
appId: "1:375459768438:web:e2a3071225c2bee5225757"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN STATE */

let loggedIn = false;
let userId = null;

/* AUTH BUTTONS */

const loginBtn =
document.getElementById("loginBtn");

const logoutBtn =
document.getElementById("logoutBtn");

const userNameDiv =
document.getElementById("userName");

loginBtn.onclick = () => {

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

};

logoutBtn.onclick = () => {

auth.signOut();

};

/* AUTH STATE */

auth.onAuthStateChanged(user => {

if (user) {

loggedIn = true;
userId = user.uid;

loginBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");

userNameDiv.innerText =
user.displayName;

/* Load saved chats */

loadChatsFromFirebase();

}

else {

loggedIn = false;

loginBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");

userNameDiv.innerText = "";

}

});

/* CHAT SYSTEM (UNCHANGED) */

let chats = [];
let activeChatId = null;

/* FIREBASE LOAD */

function loadChatsFromFirebase() {

db.collection("users")
.doc(userId)
.collection("chats")
.get()
.then(snapshot => {

chats = [];

snapshot.forEach(doc => {

chats.push(doc.data());

});

if (chats.length === 0) {

createNewChat();

}

else {

activeChatId =
chats[0].id;

renderChatList();
renderMessages();

}

});

}

/* CREATE CHAT */

function createNewChat() {

const id =
Date.now().toString();

const chat = {

id,
title: "New Chat",
messages: []

};

chats.unshift(chat);

activeChatId = id;

saveChats();

renderChatList();
renderMessages();

}

/* SAVE */

function saveChats() {

if (!loggedIn) return;

chats.forEach(chat => {

db.collection("users")
.doc(userId)
.collection("chats")
.doc(chat.id)
.set(chat);

});

}

/* REST OF YOUR ORIGINAL CODE CONTINUES EXACTLY SAME */

function renderChatList() {

const list =
document.getElementById("chatList");

list.innerHTML = "";

chats.forEach(chat => {

const item =
document.createElement("div");

item.className =
"flex justify-between items-center p-3 rounded-lg hover:bg-white/20 cursor-pointer";

if (chat.id === activeChatId) {

item.classList.add("bg-white/20");

}

const title =
document.createElement("span");

title.innerText =
chat.title || "New Chat";

title.onclick = () => {

activeChatId =
chat.id;

renderChatList();
renderMessages();

};

const menu =
document.createElement("button");

menu.innerHTML =
"<i class='fas fa-ellipsis-v'></i>";

menu.onclick = e => {

e.stopPropagation();

showMenu(chat.id);

};

item.appendChild(title);
item.appendChild(menu);

list.appendChild(item);

});

}

/* Remaining original functions unchanged */

function showMenu(chatId) {

const menuBox =
document.createElement("div");

menuBox.className =
"fixed bg-black border border-white/20 p-2 rounded-lg space-y-2";

const renameBtn =
document.createElement("button");

renameBtn.innerText = "Rename";

renameBtn.onclick = () => {

const newName =
prompt("New name:");

if (newName) {

const chat =
chats.find(c => c.id === chatId);

chat.title = newName;

saveChats();

renderChatList();

}

menuBox.remove();

};

const deleteBtn =
document.createElement("button");

deleteBtn.innerText = "Delete";

deleteBtn.onclick = () => {

chats =
chats.filter(c => c.id !== chatId);

saveChats();

renderChatList();
renderMessages();

menuBox.remove();

};

menuBox.appendChild(renameBtn);
menuBox.appendChild(deleteBtn);

document.body.appendChild(menuBox);

setTimeout(() => {

menuBox.remove();

},3000);

}

function renderMessages() {

const container =
document.getElementById("messages");

container.innerHTML = "";

const chat =
chats.find(c => c.id === activeChatId);

if (!chat) return;

chat.messages.forEach(msg => {

addMessageToUI(
msg.role,
msg.content
);

});

scrollBottom();

}

function sendMessage() {

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if (!text) return;

const chat =
chats.find(c => c.id === activeChatId);

chat.messages.push({
role:"user",
content:text
});

if (chat.messages.length === 1) {

chat.title =
text.substring(0,20);

}

addMessageToUI("user",text);

input.value = "";

scrollBottom();

setTimeout(() => {

const reply =
"Hello! This is a demo response.";

chat.messages.push({
role:"assistant",
content: reply
});

renderMessages();

saveChats();

},800);

}

function addMessageToUI(role,text) {

const container =
document.getElementById("messages");

const msg =
document.createElement("div");

msg.classList.add(
"chat-bubble",
"p-3",
"rounded-xl",
"max-w-xl"
);

if (role === "user") {

msg.classList.add(
"ml-auto",
"bg-blue-500"
);

}

else {

msg.classList.add(
"bg-white/10"
);

}

msg.innerText = text;

container.appendChild(msg);

}

function scrollBottom() {

const container =
document.getElementById("messages");

container.scrollTop =
container.scrollHeight;

}

document
.getElementById("newChatBtn")
.onclick = createNewChat;

document
.getElementById("sendBtn")
.onclick = sendMessage;

document
.getElementById("messageInput")
.addEventListener("keydown",e => {

if (e.key === "Enter" && !e.shiftKey) {

e.preventDefault();

sendMessage();

}

});

/* INIT */

createNewChat();

</script>

</body>
</html>
