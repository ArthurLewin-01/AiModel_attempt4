<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 backdrop-blur-md border-r border-white/20 flex flex-col">

<div class="p-4 border-b border-white/20 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

<i class="fas fa-plus mr-2"></i>
New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fab fa-google mr-2"></i>
Login

</button>

</div>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div class="p-4 border-b border-white/20 bg-white/5">

<h1 id="chatTitle"
class="font-bold text-lg">

New Chat

</h1>

</div>

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 border-t border-white/20 bg-white/5">

<div class="flex space-x-3">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20 resize-none"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</div>

<script>

/* LOGIN MODE */

let loggedIn =
localStorage.getItem("loggedIn") === "true";


/* LOAD CHATS */

let chats = [];

if (loggedIn) {

chats =
JSON.parse(localStorage.getItem("chats")) || [];

}


/* REMOVE UNDEFINED */

chats =
chats.filter(c => c && c.messages);


/* ACTIVE CHAT */

let activeChatId = null;


/* CREATE CHAT */

function createNewChat() {

const id =
Date.now().toString();

const chat = {

id,

title: "New Chat",

messages: []

};

chats.unshift(chat);

activeChatId = id;

saveChats();

renderChatList();

renderMessages();

}


/* SAVE */

function saveChats() {

if (loggedIn) {

localStorage.setItem(
"chats",
JSON.stringify(chats)
);

}

}


/* LOGIN BUTTON */

document
.getElementById("loginBtn")
.onclick = () => {

loggedIn = true;

localStorage.setItem(
"loggedIn",
"true"
);

alert("Logged in! Chats will now be saved.");

};


/* RENDER SIDEBAR */

function renderChatList() {

const list =
document.getElementById("chatList");

list.innerHTML = "";

chats.forEach(chat => {

const item =
document.createElement("div");

item.className =
"flex justify-between items-center p-3 rounded-lg hover:bg-white/20 cursor-pointer";

if (chat.id === activeChatId) {

item.classList.add(
"bg-white/20"
);

}


/* TITLE */

const title =
document.createElement("span");

title.innerText =
chat.title || "New Chat";

title.onclick = () => {

activeChatId =
chat.id;

renderChatList();

renderMessages();

};


/* MENU */

const menu =
document.createElement("button");

menu.innerHTML =
"<i class='fas fa-ellipsis-v'></i>";

menu.onclick = e => {

e.stopPropagation();

showMenu(chat.id);

};


item.appendChild(title);
item.appendChild(menu);

list.appendChild(item);

});

}


/* MENU UI */

function showMenu(chatId) {

const menuBox =
document.createElement("div");

menuBox.className =
"fixed bg-black border border-white/20 p-2 rounded-lg space-y-2";


/* RENAME */

const renameBtn =
document.createElement("button");

renameBtn.innerText =
"Rename";

renameBtn.className =
"block w-full text-left hover:text-blue-400";

renameBtn.onclick = () => {

const newName =
prompt("New name:");

if (newName) {

const chat =
chats.find(c => c.id === chatId);

chat.title = newName;

saveChats();

renderChatList();

}

menuBox.remove();

};


/* DELETE */

const deleteBtn =
document.createElement("button");

deleteBtn.innerText =
"Delete";

deleteBtn.className =
"block w-full text-left hover:text-red-400";

deleteBtn.onclick = () => {

chats =
chats.filter(c => c.id !== chatId);

saveChats();

renderChatList();

renderMessages();

menuBox.remove();

};


menuBox.appendChild(renameBtn);
menuBox.appendChild(deleteBtn);

document.body.appendChild(menuBox);

setTimeout(() => {

menuBox.remove();

}, 3000);

}


/* RENDER MESSAGES */

function renderMessages() {

const container =
document.getElementById("messages");

container.innerHTML = "";

const chat =
chats.find(
c => c.id === activeChatId
);

if (!chat) return;

chat.messages.forEach(msg => {

addMessageToUI(
msg.role,
msg.content
);

});

scrollBottom();

}


/* SEND */

function sendMessage() {

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if (!text) return;

const chat =
chats.find(
c => c.id === activeChatId
);


/* USER */

chat.messages.push({

role: "user",

content: text

});

if (chat.messages.length === 1) {

chat.title =
text.substring(0,20);

}


/* UI */

addMessageToUI(
"user",
text
);

input.value = "";

scrollBottom();


/* AI */

setTimeout(() => {

const reply =
"Hello! This is a demo response.";

chat.messages.push({

role:"assistant",

content: reply

});

renderMessages();

saveChats();

}, 800);

}


/* UI MSG */

function addMessageToUI(role,text) {

const container =
document.getElementById("messages");

const msg =
document.createElement("div");

msg.classList.add(
"chat-bubble",
"p-3",
"rounded-xl",
"max-w-xl"
);

if (role === "user") {

msg.classList.add(
"ml-auto",
"bg-blue-500"
);

}

else {

msg.classList.add(
"bg-white/10"
);

}

msg.innerText = text;

container.appendChild(msg);

}


/* SCROLL */

function scrollBottom() {

const container =
document.getElementById("messages");

container.scrollTop =
container.scrollHeight;

}


/* EVENTS */

document
.getElementById("newChatBtn")
.onclick = createNewChat;

document
.getElementById("sendBtn")
.onclick = sendMessage;

document
.getElementById("messageInput")
.addEventListener(
"keydown",
e => {

if (e.key === "Enter" && !e.shiftKey) {

e.preventDefault();

sendMessage();

}

}
);


/* INIT */

if (chats.length === 0) {

createNewChat();

}

else {

activeChatId =
chats[0].id;

renderChatList();

renderMessages();

}

</script>

</body>
</html>
