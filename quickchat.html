<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

.chat-bubble {
animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
from { opacity:0; transform: translateY(10px); }
to { opacity:1; transform: translateY(0); }

}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white h-screen flex">

<!-- SIDEBAR -->

<div class="w-[260px] bg-white/10 border-r border-white/20 flex flex-col">

<div class="p-4 space-y-3">

<button id="newChatBtn"
class="w-full p-3 rounded-xl border border-white/30 hover:bg-white/20">

+ New Chat

</button>

<button id="loginBtn"
class="w-full p-3 rounded-xl bg-blue-600">

Login

</button>

<button id="logoutBtn"
class="w-full p-3 rounded-xl bg-red-500 hidden">

Logout

</button>

<div id="userName"
class="text-sm text-gray-300 text-center"></div>

</div>

<div id="chatList"
class="flex-1 overflow-y-auto p-3 space-y-2">

</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<div id="messages"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<div class="p-4 flex space-x-3">

<textarea
id="messageInput"
rows="1"
placeholder="Send a message..."
class="flex-1 p-3 rounded-xl bg-white/10 border border-white/20"></textarea>

<button
id="sendBtn"
class="px-5 py-3 rounded-xl bg-blue-600">

Send

</button>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyCz5H-ad91O0FXsIev5V3ZY6x5TZ6mzr78",
authDomain: "aimodel-attempt4.firebaseapp.com",
projectId: "aimodel-attempt4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* STATE */

let chats = [];
let activeChatId = null;
let userId = null;

/* LOGIN */

loginBtn.onclick =
() => auth.signInWithPopup(
new firebase.auth.GoogleAuthProvider()
);

logoutBtn.onclick =
() => auth.signOut();

/* AUTH */

auth.onAuthStateChanged(user => {

if(user){

userId = user.uid;

loginBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");

userName.innerText =
user.displayName;

loadChats();

}

});

/* LOAD */

function loadChats(){

db.collection("users")
.doc(userId)
.collection("chats")
.get()
.then(snapshot=>{

chats=[];

snapshot.forEach(doc=>{
chats.push(doc.data());
});

if(chats.length===0){

createNewChat();

}
else{

activeChatId = chats[0].id;

}

renderChatList();
renderMessages();

});

}

/* NEW CHAT */

function createNewChat(){

const id =
Date.now().toString();

const chat = {

id:id,
title:"New Chat",
messages:[]

};

chats.unshift(chat);

activeChatId=id;

renderChatList();
renderMessages();

saveChats();

}

newChatBtn.onclick=createNewChat;

/* SAVE */

function saveChats(){

chats.forEach(chat=>{

db.collection("users")
.doc(userId)
.collection("chats")
.doc(chat.id)
.set(chat);

});

}

/* LIST */

function renderChatList(){

chatList.innerHTML="";

chats.forEach(chat=>{

const item =
document.createElement("div");

item.className=
"p-3 rounded-lg hover:bg-white/20 cursor-pointer";

item.innerText=chat.title;

item.onclick=()=>{

activeChatId=chat.id;

renderMessages();

};

chatList.appendChild(item);

});

}

/* UI MESSAGE */

function addBubble(role,text){

const msg =
document.createElement("div");

msg.className =
"chat-bubble p-3 rounded-xl max-w-xl";

if(role==="user"){

msg.classList.add(
"ml-auto",
"bg-blue-500"
);

}

else{

msg.classList.add(
"bg-white/10"
);

}

msg.innerText=text;

messages.appendChild(msg);

messages.scrollTop =
messages.scrollHeight;

}

/* RENDER */

function renderMessages(){

messages.innerHTML="";

const chat =
chats.find(
c=>c.id===activeChatId
);

if(!chat) return;

chat.messages.forEach(m=>{

addBubble(
m.role,
m.content
);

});

}

/* AI CALL */

async function askAI(messagesData){

const res =
await fetch(
"https://ai-chat-server-ltfa.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:messagesData
})
}
);

const data =
await res.json();

return data.reply;

}

/* SEND */

async function sendMessage(){

const text =
messageInput.value.trim();

if(!text) return;

const chat =
chats.find(
c=>c.id===activeChatId
);

if(!chat) return;

/* USER SHOW FIRST */

chat.messages.push({

role:"user",
content:text

});

renderMessages();

messageInput.value="";

/* TYPING */

addBubble(
"assistant",
"AI is typing..."
);

/* AI */

const reply =
await askAI(
chat.messages
);

/* REMOVE typing */

messages.removeChild(
messages.lastChild
);

/* ADD AI */

chat.messages.push({

role:"assistant",
content:reply

});

renderMessages();

saveChats();

}

sendBtn.onclick=sendMessage;

messageInput.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){

e.preventDefault();
sendMessage();

}

}
);

</script>

</body>
</html>
