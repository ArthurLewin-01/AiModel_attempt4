<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat PY - Talk to Anyone</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

body {
font-family: 'Inter', sans-serif;
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">

<!-- HEADER -->

<header class="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

<div class="flex items-center space-x-3">

<div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">

<i class="fas fa-robot text-white text-xl"></i>

</div>

<h1 class="text-2xl font-bold">

Chat PY

</h1>

</div>

<div class="flex items-center space-x-4">

<!-- LinkedIn Button Restored -->

<a href="https://www.linkedin.com/in/abdul-tofik-00848b402/"
target="_blank"
class="px-4 py-2 bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl flex items-center space-x-2">

<i class="fab fa-linkedin"></i>
<span>Thanks to Abdul Tofik</span>

</a>

</div>

</div>

</header>

<!-- MAIN -->

<div class="flex flex-col items-center justify-center text-center p-8 h-screen">

<div class="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl">

<i class="fas fa-robot text-3xl text-white"></i>

</div>

<h2 class="text-3xl font-bold mb-2">

Chat PY

</h2>

<p class="text-gray-300 mb-8 max-w-2xl">

Talk to anyone - real, fictional, or create your custom AI companion!

</p>

<div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">

<!-- QUICK CHAT -->

<button id="quickChatBtn"
class="group p-8 bg-white/5 border border-white/10 rounded-2xl hover:scale-105 transition-all">

<i class="fas fa-comments text-3xl text-blue-400 mb-4"></i>

<h3 class="text-xl font-bold mb-2">

Quick Chat

</h3>

<p class="text-gray-300">

Normal AI conversation

</p>

</button>

<!-- COMPANION BUTTON (NOT REMOVED) -->

<button id="companionBtn"
class="group p-8 bg-gradient-to-br from-purple-500/20 to-pink-500/20 border border-purple-500/30 rounded-2xl hover:scale-105">

<i class="fas fa-video text-3xl text-purple-300 mb-4"></i>

<h3 class="text-xl font-bold mb-2">

AI Companion

</h3>

<p class="text-gray-200">

Video call with custom AI

</p>

</button>

</div>

</div>

<script>

document.getElementById("quickChatBtn")
.addEventListener("click", function () {

window.location.href = "quickchat.html";

});

document.getElementById("companionBtn")
.addEventListener("click", function () {

alert("Companion mode coming soon!");

});

</script>

</body>

</html>
