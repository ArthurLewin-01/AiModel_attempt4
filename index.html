<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Companion Chat - Talk to Anyone</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

body {
font-family: 'Inter', sans-serif;
}

.chat-bubble {
animation: fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(10px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

.sidebar {
transform: translateX(-100%);
transition: transform 0.3s ease;
}

.sidebar.open {
transform: translateX(0);
}

</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">

<!-- Header -->

<header class="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

<div class="flex items-center space-x-3">

<div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">

<i class="fas fa-robot text-white text-xl"></i>

</div>

<h1 class="text-2xl font-bold">

AI Companion Chat

</h1>

</div>

<div class="flex items-center space-x-4">

<button id="sidebarToggle"
class="p-2 hover:bg-white/10 rounded-lg">

<i class="fas fa-bars text-xl"></i>

</button>

</div>

</div>

</header>

<div class="flex h-screen overflow-hidden">

<!-- Sidebar -->

<div id="sidebar"
class="sidebar w-80 bg-white/5 backdrop-blur-md border-r border-white/10 p-6">

<h2 class="text-xl font-bold mb-6">

Chat History

</h2>

<button id="newChatBtn"
class="px-4 py-2 bg-white/10 rounded-xl w-full">

New Chat

</button>

</div>

<!-- Main Content -->

<div class="flex-1 flex flex-col">

<div class="flex-1 flex flex-col items-center justify-center p-8 text-center">

<div class="w-24 h-24 bg-gradient-to-r from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">

<i class="fas fa-robot text-3xl text-white"></i>

</div>

<h2 class="text-3xl font-bold mb-2">

AI Companion Chat

</h2>

<p class="text-gray-300 mb-8 max-w-2xl mx-auto">

Talk to anyone - real, fictional, or create your custom AI companion!

</p>

<div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">

<!-- QUICK CHAT BUTTON -->

<button id="quickChatBtn"
class="group p-8 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl hover:bg-white/10 hover:border-white/20 transition-all duration-300 hover:scale-105 hover:shadow-2xl">

<i class="fas fa-comments text-3xl text-blue-400 mb-4"></i>

<h3 class="text-xl font-bold mb-2">

Quick Chat

</h3>

<p class="text-gray-300">

Normal AI conversation

</p>

</button>

<!-- COMPANION BUTTON -->

<button id="companionBtn"
class="group p-8 bg-gradient-to-br from-purple-500/20 to-pink-500/20 backdrop-blur-md border border-purple-500/30 rounded-2xl hover:scale-105">

<i class="fas fa-video text-3xl text-purple-300 mb-4"></i>

<h3 class="text-xl font-bold mb-2">

AI Companion

</h3>

<p class="text-gray-200">

Video call with custom AI

</p>

</button>

</div>

</div>

</div>

</div>

<!-- SCRIPT -->

<script>

document.addEventListener("DOMContentLoaded", function () {

setupEventListeners();

});

function setupEventListeners() {

let sidebarToggle =
document.getElementById("sidebarToggle");

let sidebar =
document.getElementById("sidebar");

if (sidebarToggle) {

sidebarToggle.addEventListener("click", function () {

sidebar.classList.toggle("open");

});

}

let newChatBtn =
document.getElementById("newChatBtn");

if (newChatBtn) {

newChatBtn.addEventListener("click", function () {

location.reload();

});

}

/* ✅ QUICK CHAT FIX */

let quickChatBtn =
document.getElementById("quickChatBtn");

if (quickChatBtn) {

quickChatBtn.addEventListener("click", function () {

window.location.href = "quickchat.html";

});

}

/* Companion Demo */

let companionBtn =
document.getElementById("companionBtn");

if (companionBtn) {

companionBtn.addEventListener("click", function () {

alert("Companion mode coming soon!");

});

}

}

</script>

</body>

</html>
