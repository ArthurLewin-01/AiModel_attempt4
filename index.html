<script>
    // Global state
    let currentChat = null;
    let isVideoMode = false;
    let aiVoice = 'male-bold';
    let personData = {};
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

    // Initialize
    document.addEventListener('DOMContentLoaded', function () {
        initChatHistory();
        setupEventListeners();
        loadChatHistory();
    });

    function setupEventListeners() {
        // Sidebar toggle
        document.getElementById('sidebarToggle')
            .addEventListener('click', toggleSidebar);

        document.getElementById('newChatBtn')
            .addEventListener('click', newChat);

        // Modal controls
        document.getElementById('cancelSetup')
            .addEventListener('click', () => {
                document.getElementById('setupModal')
                    .classList.add('hidden');
            });

        // Quick Chat Button -> Open chatbot page
        document.getElementById("quickChatBtn")
            .addEventListener("click", function () {
                window.location.href = "quickchat.html";
            });

        // Companion setup
        document.getElementById('companionBtn')
            .addEventListener('click', () => {
                document.getElementById('setupModal')
                    .classList.remove('hidden');
            });

        // Image upload
        document.getElementById('personImage')
            .addEventListener('change', handleImageUpload);

        document.getElementById('personStatus')
            .addEventListener('change', handleStatusChange);

        // Voice selection
        document.querySelectorAll('.voice-option')
            .forEach(btn => {
                btn.addEventListener('click', (e) => {

                    document.querySelectorAll('.voice-option')
                        .forEach(b =>
                            b.classList.remove(
                                'bg-white/20',
                                'ring-2',
                                'ring-blue-500'
                            )
                        );

                    e.currentTarget.classList.add(
                        'bg-white/20',
                        'ring-2',
                        'ring-blue-500'
                    );

                    aiVoice = e.currentTarget.dataset.voice;
                });
            });

        // Form validation
        document.getElementById('startChatBtn')
            .addEventListener('click', startCompanionChat);
    }

    function toggleSidebar() {
        document.getElementById('sidebar')
            .classList.toggle('open');
    }

    function handleImageUpload(e) {
        const file = e.target.files[0];

        if (file) {
            const reader = new FileReader();

            reader.onload = (e) => {
                document.getElementById('imagePreview').innerHTML =
                    `<img src="${e.target.result}" class="w-full h-48 object-cover rounded-xl">`;

                personData.image = e.target.result;

                validateForm();
            };

            reader.readAsDataURL(file);
        }
    }

    function handleStatusChange() {
        const status =
            document.getElementById('personStatus').value;

        const dynamicFields =
            document.getElementById('dynamicFields');

        dynamicFields.innerHTML = '';

        if (status) {

            const fields = {
                alive: ['name', 'age', 'gender'],
                dead: ['name', 'ageDied', 'deathAge', 'gender'],
                fictional: ['name']
            };

            const fieldConfig = {
                name: {
                    label: 'Name',
                    type: 'text'
                },
                age: {
                    label: 'Current Age',
                    type: 'number'
                },
                ageDied: {
                    label: 'Year Died',
                    type: 'number'
                },
                deathAge: {
                    label: 'Age at Death',
                    type: 'number'
                },
                gender: {
                    label: 'Gender',
                    type: 'select',
                    options: ['Male', 'Female', 'Other']
                }
            };

            fields[status].forEach(fieldKey => {

                const config =
                    fieldConfig[fieldKey];

                const field =
                    document.createElement('div');

                field.className = 'mb-4';

                field.innerHTML = `
                    <label class="block text-sm font-medium mb-2">
                        ${config.label}
                        <span class="text-red-400">*</span>
                    </label>

                    ${config.type === 'select'
                        ? `
                        <select class="person-field w-full p-3 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                                data-field="${fieldKey}">

                            <option value="">
                                Select...
                            </option>

                            ${config.options
                                .map(opt =>
                                    `<option value="${opt.toLowerCase()}">${opt}</option>`
                                )
                                .join('')}
                        </select>
                        `
                        : `
                        <input type="${config.type}"
                               class="person-field w-full p-3 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                               data-field="${fieldKey}">
                        `
                    }
                `;

                dynamicFields.appendChild(field);
            });
        }

        validateForm();
    }
</script>
